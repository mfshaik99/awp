<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farhan Form</title>
</head>
<body bgcolor = "modda">
    <h1 style="color: black;" align="center"><u>Registration Form</u></h1>
    
    <form action="success.html">
        Username : <input type="text" name="username" placeholder="Enter username">
        <br><br>
        Password : <input type="password" name="password" placeholder="Enter password">
        <br><br>
        
        DOB : <input type="date" name="dob">
        <br><br>

        Gender : 
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female
        <br><br>

        Select Courses : 
        <input type="checkbox" name="courses" value="html"> HTML
        <input type="checkbox" name="courses" value="css"> CSS
        <input type="checkbox" name="courses" value="javascript"> JavaScript
        <br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
